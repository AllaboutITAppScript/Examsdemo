<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการข้อสอบ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #e2e8f0; margin: 0; }
        .bg-green { background: #06C755; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 20px; margin-bottom: 12px; }
        .inp { background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 12px; border-radius: 12px; width: 100%; box-sizing: border-box; margin-bottom: 8px; }
        .btn { padding: 14px; border-radius: 12px; font-weight: bold; border: none; cursor: pointer; width: 100%; margin-bottom: 8px; }
        .btn-g { background: #06C755; color: white; }
        .btn-r { background: #dc2626; color: white; }
        .btn-b { background: #334155; color: white; }
        .tab { padding: 14px; text-align: center; cursor: pointer; flex: 1; color: #94a3b8; }
        .tab-on { color: #06C755; border-bottom: 3px solid #06C755; font-weight: bold; }
    </style>
</head>
<body>
    <div id="app" style="max-width:480px;margin:0 auto;min-height:100vh"></div>

    <script>
        const LIFF_ID = '2008892438-qVn8tOFT';
        // ⚠️ เปลี่ยนตรงนี้!
        const API = 'hhttps://script.google.com/macros/s/AKfycbzENEQQ1KmDwIgXitXpef_xNlXbDiBWcVai60WRVqTkP_zP_6iyXwa9shWCzEOxX4Bs/exec';
        let user = null;

        async function init() {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) await liff.login();
            user = await liff.getProfile();
            
            const r = await fetch(API + '?action=checkAdmin&userId=' + user.userId);
            const d = await r.json();
            if (!d.isAdmin) {
                document.getElementById('app').innerHTML = '<div style="text-align:center;padding:40px"><h2>⛔ ไม่มีสิทธิ์</h2></div>';
                return;
            }
            
            render();
            loadCats();
        }

        function render() {
            document.getElementById('app').innerHTML = `
                <div class="bg-green" style="padding:24px;border-radius:0 0 24px 24px"><h1>📚 จัดการข้อสอบ</h1><p>👤 ${user.displayName}</p></div>
                <div style="display:flex;border-bottom:1px solid #334155">
                    <div class="tab tab-on" onclick="sw('create')" id="tCreate">➕ สร้าง</div>
                    <div class="tab" onclick="sw('manage')" id="tManage">📋 จัดการ</div>
                    <div class="tab" onclick="sw('config')" id="tConfig">⚙️ ตั้งค่า</div>
                </div>
                <div id="content" style="padding:16px"></div>
            `;
            sw('create');
        }

        async function sw(tab) {
            document.querySelectorAll('.tab').forEach(t => { t.classList.remove('tab-on'); t.style.color = '#94a3b8'; });
            const tEl = document.getElementById('t' + tab.charAt(0).toUpperCase() + tab.slice(1));
            if (tEl) { tEl.classList.add('tab-on'); tEl.style.color = '#06C755'; }
            
            const c = document.getElementById('content');
            
            if (tab === 'create') {
                c.innerHTML = `<select id="catSel" class="inp"><option value="">เลือกหมวด...</option></select><div id="qBox"></div><button class="btn btn-b" onclick="addQ()">+ เพิ่มคำถาม</button><button class="btn btn-g" onclick="saveAll()">💾 บันทึก</button>`;
                await loadCats(); addQ();
            } else if (tab === 'manage') {
                c.innerHTML = `<select id="fCat" class="inp" onchange="loadM()"><option value="all">ทุกหมวด</option></select><div id="mList"></div>`;
                await loadCats(); loadM();
            } else if (tab === 'config') {
                c.innerHTML = `<h3>⚙️ ตั้งค่าชุดข้อสอบ</h3><select id="cfgCat" class="inp"><option value="">เลือกหมวด...</option></select><select id="cfgType" class="inp"><option value="flex">📱 Flex</option><option value="quickReply">💬 Quick Reply</option></select><input id="cfgLimit" class="inp" type="number" value="10" placeholder="จำนวนข้อ"><input id="cfgPass" class="inp" type="number" value="60" placeholder="% ผ่าน"><button class="btn btn-g" onclick="saveCfg()">💾 บันทึก</button>`;
                await loadCats();
            }
        }

        async function loadCats() {
            const r = await fetch(API + '?action=getCategories');
            const cats = await r.json();
            ['catSel', 'fCat', 'cfgCat'].forEach(id => {
                const el = document.getElementById(id); if (!el) return;
                el.innerHTML = (id === 'fCat' ? '<option value="all">ทุกหมวด</option>' : '<option value="">เลือกหมวด...</option>') + cats.map(c => '<option value="' + c.name + '">' + c.name + '</option>').join('');
            });
            const cfgCat = document.getElementById('cfgCat');
            if (cfgCat) cfgCat.onchange = () => {
                const c = cats.find(x => x.name === cfgCat.value);
                if (c) { document.getElementById('cfgType').value = c.displayType || 'flex'; document.getElementById('cfgLimit').value = c.limitPerSession || 10; document.getElementById('cfgPass').value = c.passScore || 50; }
            };
        }

        function addQ() {
            const i = document.querySelectorAll('.qcard').length;
            const d = document.createElement('div'); d.className = 'card qcard';
            d.innerHTML = '<b>ข้อ ' + (i+1) + '</b><textarea class="inp qt" rows="2" placeholder="คำถาม..."></textarea>' +
                ['A','B','C','D'].map(o => '<div style="display:flex;align-items:center;gap:8px"><input type="radio" name="c_' + i + '" value="' + o + '"><span>' + o + '.</span><input class="inp" placeholder="ตัวเลือก ' + o + '" data-o="' + o + '" style="margin:0"></div>').join('') +
                '<button class="btn btn-r" onclick="this.parentElement.remove()">🗑 ลบ</button>';
            document.getElementById('qBox').appendChild(d);
        }

        async function saveAll() {
            const cat = document.getElementById('catSel').value; if (!cat) return alert('เลือกหมวดก่อน!');
            const cards = document.querySelectorAll('.qcard');
            for (const c of cards) {
                const q = c.querySelector('.qt').value.trim();
                const cor = c.querySelector('input[type="radio"]:checked');
                if (!q || !cor) { alert('กรอกให้ครบ!'); return; }
                let url = API + '?action=saveQuestion&category=' + encodeURIComponent(cat) + '&question=' + encodeURIComponent(q) + '&correct=' + cor.value;
                ['A','B','C','D'].forEach(o => url += '&option' + o + '=' + encodeURIComponent(c.querySelector('[data-o="' + o + '"]').value.trim()));
                await fetch(url);
            }
            alert('✅ บันทึกแล้ว!'); document.getElementById('qBox').innerHTML = ''; addQ(); await loadCats();
        }

        async function loadM() {
            const cat = document.getElementById('fCat').value;
            const r = await fetch(API + '?action=getQuestions&category=' + cat);
            const qs = await r.json();
            document.getElementById('mList').innerHTML = qs.length === 0 ? '<p>📭 ไม่พบ</p>' : qs.map(q =>
                '<div class="card"><b>' + q.question + '</b><p style="color:#94a3b8">A. ' + q.option1 + ' | B. ' + q.option2 + '<br>C. ' + q.option3 + ' | D. ' + q.option4 + '</p><p style="color:#06C755">✅ ' + q.correct + ' | ' + q.status + '</p>' +
                '<button class="btn btn-b" onclick="togQ(\'' + q.id + '\',\'' + q.status + '\')">' + (q.status === 'active' ? 'ปิด' : 'เปิด') + '</button>' +
                '<button class="btn btn-r" onclick="delQ(\'' + q.id + '\')">ลบ</button></div>'
            ).join('');
        }

        async function togQ(id, st) {
            await fetch(API + '?action=toggleQuestionStatus&questionId=' + id + '&status=' + (st === 'active' ? 'inactive' : 'active'));
            loadM(); loadCats();
        }
        
        async function delQ(id) {
            if (confirm('ลบ?')) { await fetch(API + '?action=deleteQuestion&questionId=' + id); loadM(); loadCats(); }
        }

        async function saveCfg() {
            const cat = document.getElementById('cfgCat').value; if (!cat) return alert('เลือกหมวด!');
            await fetch(API + '?action=saveExamConfig&category=' + encodeURIComponent(cat) + '&displayType=' + document.getElementById('cfgType').value + '&limitPerSession=' + document.getElementById('cfgLimit').value + '&passScore=' + document.getElementById('cfgPass').value);
            alert('✅ บันทึกแล้ว!');
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
