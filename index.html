<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>จัดการข้อสอบ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Sarabun', 'Kanit', sans-serif; background: #0f172a; color: #e2e8f0; }
        .bg-green { background: linear-gradient(135deg, #06C755, #059b40); }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 20px; margin-bottom: 12px; }
        .inp { background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 12px 16px; border-radius: 12px; width: 100%; font-size: 14px; margin-bottom: 8px; }
        .inp:focus { outline: none; border-color: #06C755; }
        .btn { display: block; padding: 14px; border-radius: 12px; font-weight: bold; font-size: 16px; border: none; cursor: pointer; width: 100%; margin-bottom: 8px; text-align: center; transition: all 0.2s; }
        .btn:active { transform: scale(0.97); }
        .btn-g { background: #06C755; color: white; }
        .btn-r { background: #dc2626; color: white; }
        .btn-b { background: #334155; color: white; }
        .btn-o { background: #f97316; color: white; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .tab { padding: 14px 8px; text-align: center; cursor: pointer; flex: 1; color: #94a3b8; border-bottom: 3px solid transparent; transition: all 0.2s; font-size: 13px; }
        .tab-on { color: #06C755 !important; border-bottom: 3px solid #06C755 !important; font-weight: bold !important; }
        .hidden { display: none !important; }
        .toast { position: fixed; bottom: 20px; left: 20px; right: 20px; background: #1e293b; border: 1px solid #334155; color: white; padding: 16px; border-radius: 12px; text-align: center; z-index: 200; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .toast-show { opacity: 1; }
        .loading-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(4px); z-index: 300; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .loading-overlay.show { opacity: 1; pointer-events: all; }
        .loading-box { background: #1e293b; border: 1px solid #334155; border-radius: 20px; padding: 32px 40px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        .spinner { width: 48px; height: 48px; border: 4px solid #334155; border-top: 4px solid #06C755; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .success-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(6px); z-index: 400; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .success-overlay.show { opacity: 1; pointer-events: all; }
        .success-box { background: #1e293b; border: 1px solid #06C755; border-radius: 24px; padding: 40px 32px; text-align: center; box-shadow: 0 20px 60px rgba(6, 199, 85, 0.2); max-width: 340px; width: 90%; animation: popIn 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55); }
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .success-icon { width: 80px; height: 80px; background: rgba(6, 199, 85, 0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(6, 199, 85, 0.4); } 50% { box-shadow: 0 0 0 20px rgba(6, 199, 85, 0); } }
        .loader { width: 40px; height: 40px; border: 4px solid #334155; border-top: 4px solid #06C755; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
        textarea { resize: vertical; min-height: 60px; }
    </style>
</head>
<body>

    <div id="loadingScreen" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0f172a;">
        <div style="text-align:center"><div class="loader"></div><p style="color:#94a3b8;margin-top:16px">กำลังโหลดระบบ...</p><p id="loadingStatus" style="color:#64748b;font-size:12px;margin-top:8px"></p></div>
    </div>

    <div id="mainApp" class="hidden" style="max-width:480px;margin:0 auto;min-height:100vh">
        <div class="bg-green" style="padding:24px;border-radius:0 0 24px 24px">
            <div style="display:flex;justify-content:space-between;align-items:center">
                <div><h1 style="font-size:22px"><i class="fa-solid fa-graduation-cap"></i> จัดการข้อสอบ</h1><p id="userDisplayName" style="opacity:0.8;font-size:14px;margin-top:4px"></p></div>
                <button onclick="closeApp()" style="background:rgba(255,255,255,0.2);border:none;color:white;padding:8px 12px;border-radius:8px;cursor:pointer;font-size:20px"><i class="fa-solid fa-xmark"></i></button>
            </div>
        </div>
        <div style="display:flex;border-bottom:1px solid #334155;background:#1e293b;overflow-x:auto">
            <div class="tab tab-on" onclick="switchTab('create')" id="tabCreate"><i class="fa-solid fa-plus-circle"></i> สร้าง</div>
            <div class="tab" onclick="switchTab('manage')" id="tabManage"><i class="fa-solid fa-list-check"></i> จัดการ</div>
            <div class="tab" onclick="switchTab('config')" id="tabConfig"><i class="fa-solid fa-sliders"></i> ตั้งค่า</div>
            <div class="tab" onclick="switchTab('admins')" id="tabAdmins"><i class="fa-solid fa-user-shield"></i> แอดมิน</div>
        </div>
        <div id="tabContent" style="padding:16px"></div>
    </div>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-box"><div class="spinner"></div><p style="color:white;font-size:16px;font-weight:bold" id="loadingTitle">กำลังบันทึก...</p><p style="color:#94a3b8;font-size:13px;margin-top:4px" id="loadingSub"></p></div>
    </div>

    <div id="successOverlay" class="success-overlay">
        <div class="success-box">
            <div class="success-icon"><i class="fa-solid fa-circle-check" style="font-size:40px;color:#06C755"></i></div>
            <h2 style="color:white;font-size:20px;margin-bottom:8px">บันทึกสำเร็จ!</h2>
            <p id="successMessage" style="color:#94a3b8;font-size:14px;margin-bottom:20px"></p>
            <button onclick="closeSuccess()" class="btn btn-g" style="width:auto;display:inline-block;padding:12px 32px"><i class="fa-solid fa-check"></i> ตกลง</button>
        </div>
    </div>

    <div id="toast" class="toast"><i id="toastIcon" class="fa-solid fa-circle-info" style="margin-right:8px"></i><span id="toastMsg"></span></div>

    <script>
        const LIFF_ID = '2008892438-qVn8tOFT';
        const API_URL = 'https://script.google.com/macros/s/AKfycbzENEQQ1KmDwIgXitXpef_xNlXbDiBWcVai60WRVqTkP_zP_6iyXwa9shWCzEOxX4Bs/exec';
        let user = null, questionCount = 0, toastTimer = null;

        async function init() {
            try {
                updateStatus('กำลังเริ่มต้น LIFF...');
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { updateStatus('กำลังเข้าสู่ระบบ...'); await liff.login(); }
                user = await liff.getProfile();
                document.getElementById('userDisplayName').textContent = user.displayName;
                if (liff.isInClient()) { try { const fs = await liff.getFriendship(); if (!fs.friendFlag) await liff.requestFriendship(); } catch(e) {} }
                updateStatus('กำลังตรวจสอบสิทธิ์...');
                const r = await fetch(API_URL + '?action=checkAdmin&userId=' + encodeURIComponent(user.userId));
                const d = await r.json();
                if (!d.isAdmin) { showError('<i class="fa-solid fa-lock"></i> คุณไม่มีสิทธิ์เข้าถึง'); return; }
                document.getElementById('loadingScreen').style.display = 'none';
                document.getElementById('mainApp').classList.remove('hidden');
                await loadCategories(); switchTab('create');
            } catch(e) { showError(e.message); }
        }

        function updateStatus(m) { document.getElementById('loadingStatus').textContent = m; }
        function showError(m) { document.getElementById('loadingScreen').innerHTML = '<div style="text-align:center"><i class="fa-solid fa-circle-exclamation" style="font-size:48px;color:#ef4444"></i><p style="color:white;margin-top:16px">' + m + '</p><button onclick="location.reload()" class="btn btn-g" style="width:auto;margin:16px auto;padding:12px 24px"><i class="fa-solid fa-rotate"></i> ลองใหม่</button></div>'; }
        function closeApp() { if (liff.isInClient()) liff.closeWindow(); else window.close(); }
        function showLoading(t, s) { document.getElementById('loadingTitle').textContent = t || 'กำลังดำเนินการ...'; document.getElementById('loadingSub').textContent = s || ''; document.getElementById('loadingOverlay').classList.add('show'); }
        function hideLoading() { document.getElementById('loadingOverlay').classList.remove('show'); }
        function showSuccess(m) { document.getElementById('successMessage').textContent = m; document.getElementById('successOverlay').classList.add('show'); }
        function closeSuccess() { document.getElementById('successOverlay').classList.remove('show'); }

        function showToast(m, t) {
            t = t || 'info';
            var icons = { success: 'fa-circle-check', error: 'fa-circle-exclamation', warning: 'fa-triangle-exclamation', info: 'fa-circle-info' };
            document.getElementById('toastIcon').className = 'fa-solid ' + (icons[t] || icons.info);
            document.getElementById('toastMsg').textContent = m;
            document.getElementById('toast').classList.add('toast-show');
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(function() { document.getElementById('toast').classList.remove('toast-show'); }, 3000);
        }

        function switchTab(tab) {
            ['create','manage','config','admins'].forEach(function(t) { var el = document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1)); if (el) { el.classList.remove('tab-on'); el.style.color = '#94a3b8'; } });
            var at = document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)); if (at) { at.classList.add('tab-on'); at.style.color = '#06C755'; }
            renderTab(tab);
        }

        function renderTab(tab) {
            var c = document.getElementById('tabContent');
            if (tab === 'create') {
                c.innerHTML = '<div class="card"><label style="font-weight:bold;margin-bottom:8px;display:block"><i class="fa-solid fa-layer-group"></i> เลือกหมวดข้อสอบ</label><select id="categorySelect" class="inp"><option value="">-- เลือกหมวด --</option></select></div><div id="questionsContainer"></div><button class="btn btn-b" onclick="addQuestion()"><i class="fa-solid fa-plus"></i> เพิ่มคำถาม</button><button class="btn btn-g" onclick="saveAllQuestions()" id="saveBtn"><i class="fa-solid fa-floppy-disk"></i> บันทึกข้อสอบทั้งหมด</button>';
                loadCategories(); addQuestion();
            } else if (tab === 'manage') {
                c.innerHTML = '<div class="card"><label style="font-weight:bold;margin-bottom:8px;display:block"><i class="fa-solid fa-filter"></i> กรองตามหมวด</label><select id="filterCategory" class="inp" onchange="loadQuestions()"><option value="all">ทุกหมวด</option></select></div><div id="questionsList"><div class="loader"></div></div>';
                loadCategories(); loadQuestions();
            } else if (tab === 'config') {
                c.innerHTML = '<div class="card"><h3 style="font-size:18px;margin-bottom:16px"><i class="fa-solid fa-sliders"></i> ตั้งค่าชุดข้อสอบ</h3><label style="font-weight:bold;margin-bottom:8px;display:block"><i class="fa-solid fa-layer-group"></i> เลือกหมวด</label><select id="configCategory" class="inp"><option value="">-- เลือกหมวด --</option></select><label style="font-weight:bold;margin-bottom:8px;display:block"><i class="fa-solid fa-mobile-screen"></i> รูปแบบข้อสอบ</label><select id="configDisplayType" class="inp"><option value="flex">Flex Message</option><option value="quickReply">Quick Reply</option></select><label style="font-weight:bold;margin-bottom:8px;display:block"><i class="fa-solid fa-hashtag"></i> จำนวนข้อต่อครั้ง</label><input type="number" id="configLimit" class="inp" value="10" min="1" max="50"><label style="font-weight:bold;margin-bottom:8px;display:block"><i class="fa-solid fa-bullseye"></i> เปอร์เซ็นต์ผ่าน</label><input type="number" id="configPass" class="inp" value="60" min="0" max="100"><button class="btn btn-g" onclick="saveConfig()"><i class="fa-solid fa-floppy-disk"></i> บันทึกการตั้งค่า</button></div>';
                loadCategories();
            } else if (tab === 'admins') {
                c.innerHTML = '<div class="card"><h3 style="font-size:18px;margin-bottom:16px"><i class="fa-solid fa-user-shield"></i> จัดการแอดมิน</h3><label style="font-weight:bold;margin-bottom:8px;display:block"><i class="fa-solid fa-user-plus"></i> เพิ่มแอดมินจากผู้ใช้</label><select id="userSelect" class="inp"><option value="">-- เลือกผู้ใช้ --</option></select><button class="btn btn-g" onclick="addAdminUser()"><i class="fa-solid fa-plus"></i> เพิ่มเป็นแอดมิน</button></div><div class="card"><h3 style="font-size:18px;margin-bottom:16px"><i class="fa-solid fa-list"></i> รายชื่อแอดมิน</h3><div id="adminsList"><div class="loader"></div></div></div>';
                loadUsers(); loadAdmins();
            }
        }

        async function loadCategories() {
            try {
                const r = await fetch(API_URL + '?action=getCategories'); const cats = await r.json();
                var cs = document.getElementById('categorySelect'); if (cs) cs.innerHTML = '<option value="">-- เลือกหมวด --</option>' + cats.map(function(c) { return '<option value="' + c.name + '">' + c.name + ' (' + (c.questionCount || 0) + ' ข้อ)</option>'; }).join('');
                var fs = document.getElementById('filterCategory'); if (fs) fs.innerHTML = '<option value="all">ทุกหมวด</option>' + cats.map(function(c) { return '<option value="' + c.name + '">' + c.name + '</option>'; }).join('');
                var cf = document.getElementById('configCategory'); if (cf) { cf.innerHTML = '<option value="">-- เลือกหมวด --</option>' + cats.map(function(c) { return '<option value="' + c.name + '">' + c.name + '</option>'; }).join(''); cf.onchange = function() { var s = cats.find(function(x) { return x.name === cf.value; }); if (s) { document.getElementById('configDisplayType').value = s.displayType || 'flex'; document.getElementById('configLimit').value = s.limitPerSession || 10; document.getElementById('configPass').value = s.passScore || 50; } }; }
            } catch(e) {}
        }

        function addQuestion(data) {
            data = data || {}; var container = document.getElementById('questionsContainer'); if (!container) return;
            var index = questionCount;
            var card = document.createElement('div'); card.className = 'card question-card'; card.setAttribute('data-index', index);
            card.innerHTML = '<div style="display:flex;justify-content:space-between;margin-bottom:12px"><span style="font-weight:bold"><i class="fa-solid fa-pencil"></i> ข้อที่ <span class="q-num">' + (index + 1) + '</span></span><button onclick="this.closest(\'.question-card\').remove();reindexQuestions();" style="background:none;border:none;color:#ef4444;cursor:pointer;font-size:16px"><i class="fa-solid fa-trash-can"></i></button></div><textarea class="inp q-text" rows="2" placeholder="พิมพ์คำถามที่นี่...">' + (data.question || '') + '</textarea>' + ['A','B','C','D'].map(function(o, idx) { return '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><input type="radio" name="correct_' + index + '" value="' + o + '" style="accent-color:#06C755;width:18px;height:18px" ' + (data.correct === o ? 'checked' : '') + '><span style="font-weight:bold;width:24px">' + o + '.</span><input type="text" class="inp" placeholder="ตัวเลือก ' + o + '" data-opt="' + o + '" value="' + (data['option' + (idx + 1)] || '') + '" style="margin:0"></div>'; }).join('') + (data.id ? '<input type="hidden" class="q-id" value="' + data.id + '">' : '');
            container.appendChild(card); questionCount++;
        }

        function reindexQuestions() {
            document.querySelectorAll('.question-card').forEach(function(c, i) { c.setAttribute('data-index', i); c.querySelector('.q-num').textContent = i + 1; c.querySelectorAll('input[type="radio"]').forEach(function(r) { r.name = 'correct_' + i; }); });
            questionCount = document.querySelectorAll('.question-card').length;
        }

        // ✅ ใช้ URLSearchParams (GET) แทน FormData
        async function saveAllQuestions() {
            var cat = document.getElementById('categorySelect');
            if (!cat || !cat.value) { showToast('กรุณาเลือกหมวดข้อสอบก่อน', 'warning'); return; }
            var cards = document.querySelectorAll('.question-card');
            if (cards.length === 0) { showToast('กรุณาเพิ่มคำถามอย่างน้อย 1 ข้อ', 'warning'); return; }
            
            showLoading('กำลังบันทึกข้อสอบ...', 'กรุณารอสักครู่');
            
            try {
                for (var i = 0; i < cards.length; i++) {
                    var card = cards[i];
                    var question = card.querySelector('.q-text').value.trim();
                    var correctRadio = card.querySelector('input[type="radio"]:checked');
                    var qid = card.querySelector('.q-id') ? card.querySelector('.q-id').value : null;
                    
                    if (!question) throw new Error('กรุณากรอกคำถามข้อที่ ' + (i + 1));
                    if (!correctRadio) throw new Error('กรุณาเลือกคำตอบที่ถูกต้อง ข้อที่ ' + (i + 1));
                    
                    // ✅ ใช้ URLSearchParams
                    var params = new URLSearchParams();
                    params.append('action', 'saveQuestion');
                    params.append('category', cat.value);
                    params.append('question', question);
                    params.append('correct', correctRadio.value);
                    params.append('optionA', card.querySelector('[data-opt="A"]').value.trim());
                    params.append('optionB', card.querySelector('[data-opt="B"]').value.trim());
                    params.append('optionC', card.querySelector('[data-opt="C"]').value.trim());
                    params.append('optionD', card.querySelector('[data-opt="D"]').value.trim());
                    if (qid) params.append('id', qid);
                    
                    var r = await fetch(API_URL + '?' + params.toString());
                    var d = await r.json();
                    if (!d.success) throw new Error(d.message || 'บันทึกไม่สำเร็จ');
                }
                
                hideLoading();
                showSuccess('บันทึกข้อสอบ <b>' + cards.length + '</b> ข้อเรียบร้อย!');
                document.getElementById('questionsContainer').innerHTML = ''; questionCount = 0; addQuestion(); cat.value = '';
                await loadCategories();
            } catch(e) { hideLoading(); showToast(e.message, 'error'); }
        }

        async function loadQuestions() {
            var container = document.getElementById('questionsList'); if (!container) return;
            container.innerHTML = '<div class="loader"></div>';
            try {
                var cat = document.getElementById('filterCategory'); var category = cat ? cat.value : 'all';
                var r = await fetch(API_URL + '?action=getQuestions&category=' + category); var questions = await r.json();
                if (questions.length === 0) { container.innerHTML = '<div style="text-align:center;padding:40px;color:#94a3b8"><i class="fa-solid fa-folder-open"></i> ไม่พบข้อสอบ</div>'; return; }
                container.innerHTML = questions.map(function(q) {
                    return '<div class="card" style="opacity:' + (q.status === 'inactive' ? '0.5' : '1') + '"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="background:' + (q.status === 'active' ? '#16a34a' : '#dc2626') + ';color:white;padding:2px 10px;border-radius:20px;font-size:12px"><i class="fa-solid ' + (q.status === 'active' ? 'fa-circle-check' : 'fa-circle-pause') + '"></i> ' + (q.status === 'active' ? 'ใช้งาน' : 'ปิด') + '</span><span style="background:#334155;padding:2px 10px;border-radius:20px;font-size:12px"><i class="fa-solid fa-folder"></i> ' + q.category + '</span></div><h3 style="font-size:16px;margin-bottom:8px">' + q.question + '</h3><div style="font-size:13px;color:#94a3b8;margin-bottom:8px">A. ' + q.option1 + ' &nbsp; B. ' + q.option2 + '<br>C. ' + q.option3 + ' &nbsp; D. ' + q.option4 + '</div><div style="color:#06C755;font-size:13px;margin-bottom:8px"><i class="fa-solid fa-check-circle"></i> คำตอบ: ' + q.correct + '</div><div style="display:flex;gap:8px"><button class="btn btn-o" style="flex:1;font-size:13px;padding:8px" onclick="toggleQuestion(\'' + q.id + '\',\'' + q.status + '\')"><i class="fa-solid ' + (q.status === 'active' ? 'fa-pause' : 'fa-play') + '"></i> ' + (q.status === 'active' ? 'ปิดใช้งาน' : 'เปิดใช้งาน') + '</button><button class="btn btn-r" style="flex:1;font-size:13px;padding:8px" onclick="deleteQuestion(\'' + q.id + '\')"><i class="fa-solid fa-trash-can"></i> ลบ</button></div></div>';
                }).join('');
            } catch(e) { container.innerHTML = '<div style="text-align:center;color:#ef4444"><i class="fa-solid fa-triangle-exclamation"></i> เกิดข้อผิดพลาด</div>'; }
        }

        async function toggleQuestion(id, status) {
            await fetch(API_URL + '?action=toggleQuestionStatus&questionId=' + id + '&status=' + (status === 'active' ? 'inactive' : 'active'));
            showToast('เรียบร้อย', 'success'); loadQuestions(); loadCategories();
        }

        async function deleteQuestion(id) {
            if (!confirm('ยืนยันการลบข้อสอบนี้?')) return;
            await fetch(API_URL + '?action=deleteQuestion&questionId=' + id);
            showToast('ลบข้อสอบเรียบร้อย', 'success'); loadQuestions(); loadCategories();
        }

        async function saveConfig() {
            var cat = document.getElementById('configCategory').value;
            if (!cat) { showToast('กรุณาเลือกหมวดข้อสอบ', 'warning'); return; }
            showLoading('กำลังบันทึกการตั้งค่า...', cat);
            var params = new URLSearchParams();
            params.append('action', 'saveExamConfig');
            params.append('category', cat);
            params.append('displayType', document.getElementById('configDisplayType').value);
            params.append('limitPerSession', document.getElementById('configLimit').value);
            params.append('passScore', document.getElementById('configPass').value);
            try {
                var r = await fetch(API_URL + '?' + params.toString()); var d = await r.json();
                hideLoading();
                if (d.success) { showSuccess('ตั้งค่าหมวด <b>' + cat + '</b> เรียบร้อย!'); loadCategories(); }
                else showToast(d.message || 'บันทึกไม่สำเร็จ', 'error');
            } catch(e) { hideLoading(); showToast('เกิดข้อผิดพลาด', 'error'); }
        }

        async function loadUsers() {
            try { var r = await fetch(API_URL + '?action=getUsers'); var users = await r.json(); var s = document.getElementById('userSelect'); if (s) s.innerHTML = '<option value="">-- เลือกผู้ใช้ --</option>' + users.map(function(u) { return '<option value="' + u.userId + '">' + u.displayName + '</option>'; }).join(''); } catch(e) {}
        }

        async function loadAdmins() {
            var c = document.getElementById('adminsList'); if (!c) return; c.innerHTML = '<div class="loader"></div>';
            try {
                var r = await fetch(API_URL + '?action=getAdmins'); var admins = await r.json();
                if (admins.length === 0) { c.innerHTML = '<div style="text-align:center;padding:20px;color:#94a3b8"><i class="fa-solid fa-user-slash"></i> ไม่มีแอดมิน</div>'; return; }
                c.innerHTML = admins.map(function(a) { return '<div class="card" style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-weight:bold;color:white">' + a.name + '</div><div style="font-size:12px;color:#94a3b8">' + a.role + '</div></div><button class="btn btn-r" style="width:auto;padding:8px 16px;font-size:13px" onclick="removeAdminUser(\'' + a.userId + '\')"><i class="fa-solid fa-trash-can"></i></button></div>'; }).join('');
            } catch(e) {}
        }

        async function addAdminUser() { var s = document.getElementById('userSelect'); if (!s || !s.value) { showToast('กรุณาเลือกผู้ใช้ก่อน', 'warning'); return; } await fetch(API_URL + '?action=addAdmin&userId=' + encodeURIComponent(s.value)); showToast('เพิ่มแอดมินเรียบร้อย!', 'success'); loadAdmins(); }
        async function removeAdminUser(uid) { if (!confirm('ยืนยันการลบแอดมินนี้?')) return; await fetch(API_URL + '?action=removeAdmin&userId=' + uid); showToast('ลบแอดมินเรียบร้อย!', 'success'); loadAdmins(); }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
